[DEFAULT]
# 浏览器类型: chromium, firefox, webkit
browser = chromium
# 是否使用无头模式: true, false
headless = false
# 页面加载超时时间（秒）
page_load_timeout = 30
# 元素操作超时时间（秒）
element_timeout = 10
# 截图目录
screenshot_dir = screenshots
# 报告目录
report_dir = reports
# 日志级别: DEBUG, INFO, WARNING, ERROR, CRITICAL
log_level = INFO
# 最大爬取分析页面数，防止无限爬取
max_pages = 20

[TEST]
# 默认测试选择: all, 或具体测试ID
default_test_selection = all
# 是否自动生成pytest测试文件: true, false
generate_pytest = true